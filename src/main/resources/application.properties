spring.application.name=task-tracker-project-spring
# Database connection details (In-Memory Database)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Ignoring Hibernate to make sure it doesn't conflict with Flyway
spring.jpa.hibernate.ddl-auto=none

# Enable the H2 web console to inspect your tables
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Gmail SMTP. spring.mail.host is the trigger that activates MailSenderAutoConfiguration.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
# Your full Gmail address, e.g. yourname@gmail.com (also used as the "From" below).
spring.mail.username=${MAIL_USERNAME:}
# A Google App Password (16 chars, NOT your normal account password). Requires 2FA enabled.
# Generate at https://myaccount.google.com/apppasswords . Prefer the MAIL_PASSWORD env var so it stays out of source control.
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# "From" address shown on notifications. For Gmail this must match spring.mail.username.
app.mail.from=${MAIL_FROM:}